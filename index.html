<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Krig</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header>
    <div class="header-inner">
        <h1>Krig</h1>
        <span class="deck-pill">Kort igjen: <strong id="deck-count">52</strong></span>
    </div>
</header>

<main>
    <div class="scoreboard">
        <div class="player-block">
            <span class="player-tag">P1</span>
            <span class="score-num" id="score1">0</span>
        </div>
        <div class="divider-line"></div>
        <div class="player-block right">
            <span class="player-tag">P2</span>
            <span class="score-num" id="score2">0</span>
        </div>
    </div>

    <div class="arena">
        <div class="player-zone">
            <div id="card1-display" class="card-slot">
                <img src="cards/Kortstokk_bakside.png" alt="kort">
            </div>
            <span class="zone-label">Spiller 1</span>
        </div>

        <div class="center-col">
            <div id="result" class="result-text"></div>
            <button id="draw-btn">
                <span>Snu kort</span>
            </button>
        </div>

        <div class="player-zone">
            <div id="card2-display" class="card-slot">
                <img src="cards/Kortstokk_bakside.png" alt="kort">
            </div>
            <span class="zone-label">Spiller 2</span>
        </div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
